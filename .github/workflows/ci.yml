name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Regenerate coverage badges
        run: node scripts/generate-coverage-badges.mjs

      - name: Verify badges and coverage summaries are up to date
        run: git diff --exit-code .github/badges/ '**/coverage/coverage-summary.json'
