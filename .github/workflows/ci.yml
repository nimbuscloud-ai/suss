name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 gives the threshold check access to the
          # main-branch coverage baselines via `git show origin/main:...`.
          # The default GITHUB_TOKEN has contents: write for same-repo
          # pushes (main + same-repo PR branches).
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          # For pull_request events, checkout defaults to a detached
          # merge commit; we need the real head ref so the auto-commit
          # pushes back to the PR branch instead of a dangling SHA.
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Turbo persists task outputs under .turbo/. Caching it between
      # runs lets `turbo build / test / lint / typecheck` hit "FULL TURBO"
      # for packages whose hashed inputs didn't change. Key includes the
      # commit SHA so each run writes its own cache entry; restore-keys
      # walk back to the nearest previous turbo cache. Invalidated
      # automatically when package-lock.json changes (dependency churn
      # affects task hashes).
      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            turbo-${{ runner.os }}-

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Regenerate coverage badges
        run: node scripts/generate-coverage-badges.mjs

      # On PRs: enforce no coverage degradation vs main. Drift in the
      # committed coverage files is NOT failed — the auto-commit step
      # below will push the refresh back to the PR branch. Regressions
      # (line-coverage % below main's baseline) fail the build here.
      - name: Coverage regression check (PRs)
        if: github.event_name == 'pull_request'
        run: node scripts/check-coverage-threshold.mjs

      # Auto-commit refreshed coverage on any same-repo push (main or
      # same-repo PR branch). Fork PRs lack write permission; the step
      # no-ops silently in that case. The `[skip` `ci]` marker in the
      # commit body suppresses the follow-on CI run — safe because the
      # regen is deterministic, so a second run would produce no diff
      # anyway.
      #
      # HUSKY=0 disables the local pre-commit / pre-push hooks the repo
      # uses for developers; CI has already run its own equivalents
      # (typecheck, test, lint) earlier in this workflow. Without this,
      # the bot's `git push` would re-run the full test suite inside the
      # pre-push hook (wasting ~2 minutes).
      #
      # The push is non-fast-forward-safe: a concurrent commit from
      # another workflow could land between our checkout and our push.
      # We rebase against the remote tip and retry once; if it still
      # races, we skip silently so the next legitimate push picks up
      # the drift.
      - name: Auto-commit refreshed coverage
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'pull_request' &&
           github.event.pull_request.head.repo.full_name == github.repository)
        env:
          HUSKY: "0"
        run: |
          if git diff --quiet .github/badges/ '**/coverage/coverage-summary.json'; then
            echo "No coverage drift — skipping auto-commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/ '**/coverage/coverage-summary.json'
          git commit -m "chore: refresh coverage summaries and badges [skip ci]"
          TARGET="${{ github.event.pull_request.head.ref || github.ref_name }}"

          for attempt in 1 2; do
            if git push origin "HEAD:$TARGET"; then
              echo "Pushed refresh on attempt $attempt."
              exit 0
            fi
            echo "Push rejected on attempt $attempt — rebasing and retrying."
            git fetch origin "$TARGET"
            git rebase "origin/$TARGET" || {
              echo "Rebase failed; skipping refresh. The next push will re-trigger."
              exit 0
            }
          done

          echo "Push still rejected after rebase + retry; skipping refresh."
          exit 0
